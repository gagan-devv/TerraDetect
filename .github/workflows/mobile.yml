name: Expo Mobile
on:
    push:
        paths: ['mobile/**']
    pull_request:
        paths: ['mobile/**']

jobs:
    typecheck:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '20'
            - run: npm ci
              working-directory: mobile
            - run: npx tsc --noEmit
              working-directory: mobile