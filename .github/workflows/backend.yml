name: Go Backend

on:
    push:
        paths: ['backend/**']
    pull_request:
        paths: ['backend/**']

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v4
              with:
                  go-version: '1.22'
            - run: go vet -v ./...
              working-directory: backend
            - run: go test ./...
              working-directory: backend