<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TerraDetect - Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary-container": "#f7fff2",
              "primary-container": "#00873a",
              "on-secondary-fixed-variant": "#004b73",
              "surface-dim": "#d9dadb",
              "on-secondary": "#ffffff",
              "secondary-fixed-dim": "#93ccff",
              "surface-container-low": "#f3f4f5",
              "on-primary-fixed": "#002109",
              "surface-container-lowest": "#ffffff",
              "inverse-on-surface": "#f0f1f2",
              "secondary": "#006398",
              "inverse-surface": "#2e3132",
              "surface-tint": "#006e2d",
              "primary-fixed-dim": "#62df7d",
              "on-surface": "#191c1d",
              "on-primary-fixed-variant": "#005320",
              "on-tertiary-fixed": "#2a1700",
              "secondary-container": "#5bb8fe",
              "on-primary": "#ffffff",
              "on-surface-variant": "#3e4a3d",
              "error": "#ba1a1a",
              "on-error": "#ffffff",
              "tertiary": "#825100",
              "primary": "#006b2c",
              "on-tertiary-container": "#fffbff",
              "background": "#f8f9fa",
              "inverse-primary": "#62df7d",
              "error-container": "#ffdad6",
              "outline": "#6e7b6c",
              "surface-container": "#edeeef",

              "tertiary-fixed-dim": "#ffb95f",
              "on-background": "#191c1d",
              "secondary-fixed": "#cce5ff",
              "on-secondary-fixed": "#001d31",
              "surface-container-high": "#e7e8e9",
              "outline-variant": "#bdcaba",
              "on-tertiary": "#ffffff",
              "on-secondary-container": "#00476e",
              "surface": "#f8f9fa",
              "on-error-container": "#93000a",
              "tertiary-container": "#a36700"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .editorial-gradient {
        background: linear-gradient(135deg, #006b2c 0%, #00873a 100%);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col">
<!-- Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-6 py-12 relative overflow-hidden">
<!-- Decorative Background Element (Editorial Agronomy Style) -->
<div class="absolute -top-24 -right-24 w-96 h-96 rounded-full bg-primary/5 blur-3xl"></div>
<div class="absolute -bottom-24 -left-24 w-96 h-96 rounded-full bg-secondary/5 blur-3xl"></div>
<!-- Identity Section -->
<div class="w-full max-w-md text-center mb-12">
<div class="inline-flex items-center justify-center w-20 h-20 bg-primary-container rounded-lg mb-6 shadow-[0_8px_32px_rgba(0,107,44,0.12)]">
<span class="material-symbols-outlined text-on-primary-container text-4xl" data-icon="eco">eco</span>
</div>
<h1 class="font-headline font-black text-4xl tracking-tight text-primary mb-2">TerraDetect</h1>
<p class="text-on-surface-variant font-medium text-body-lg">Precision agronomy at your fingertips.</p>
</div>
<!-- Login Form Card -->
<div class="w-full max-w-md bg-surface-container-lowest p-8 md:p-10 rounded-lg shadow-[0_8px_32px_rgba(25,28,29,0.04)] relative z-10">
<form action="#" class="space-y-6" method="POST">
<!-- Username Input -->
<div class="space-y-2">
<label class="block font-label text-sm font-semibold text-on-surface-variant ml-4 uppercase tracking-wider" for="username">Username</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-full px-6 py-4 focus:ring-2 focus:ring-primary text-on-surface placeholder:text-outline-variant font-medium" id="username" name="username" placeholder="j.appleseed" type="text"/>
<div class="absolute right-5 top-1/2 -translate-y-1/2 text-outline">
<span class="material-symbols-outlined" data-icon="person">person</span>
</div>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<label class="block font-label text-sm font-semibold text-on-surface-variant ml-4 uppercase tracking-wider" for="password">Password</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-full px-6 py-4 focus:ring-2 focus:ring-primary text-on-surface placeholder:text-outline-variant font-medium" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-5 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Device ID Input -->
<div class="space-y-2 pb-2">
<label class="block font-label text-sm font-semibold text-on-surface-variant ml-4 uppercase tracking-wider" for="device_id">Device ID</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-full px-6 py-4 focus:ring-2 focus:ring-primary text-on-surface placeholder:text-outline-variant font-medium" id="device_id" name="device_id" placeholder="TD-992-01" type="text"/>
<div class="absolute right-5 top-1/2 -translate-y-1/2 text-outline">
<span class="material-symbols-outlined" data-icon="sensors">sensors</span>
</div>
</div>
<p class="text-[11px] text-outline font-medium px-4">Found on the back of your TerraDetect sensor.</p>
</div>
<!-- Action Button -->
<button class="w-full editorial-gradient text-on-primary font-headline font-bold text-lg py-4 rounded-full shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all duration-200 flex items-center justify-center gap-2" type="submit">
                    Sign In
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<div class="mt-8 pt-6 text-center border-t border-surface-container-high">
<a class="text-primary font-headline font-bold hover:text-primary-container transition-colors inline-flex items-center gap-1" href="#">
                    Create Account
                    <span class="material-symbols-outlined text-sm" data-icon="open_in_new">open_in_new</span>
</a>
<p class="mt-2 text-on-surface-variant text-xs">New to the field? Start your journey today.</p>
</div>
</div>
<!-- Footer Visual -->
<div class="mt-12 w-full max-w-lg hidden md:block">
<div class="bg-surface-container rounded-lg p-1 flex items-center gap-4 overflow-hidden h-32 relative">
<div class="w-1/3 h-full rounded-md overflow-hidden grayscale contrast-125 opacity-40">
<img alt="Soil Texture" class="w-full h-full object-cover" data-alt="Macro close-up of rich dark fertile soil with organic texture and soft natural light hitting the surface" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDtKrxeNuF_Etk-5PTMo79JWSyV_tNrmWZMkVnwKPMCjBzsUkQIjjsMr7E6ylavqRdTJ18auZAVvJnAnWYc_BBeTRydzrVx3v6cecEl5ZHhOOmJZqiuTtp3B5IQBs8MaKR4mJ3v69Y8BfXa2O3GjrR7ImFDwIEQQhtHrsMMsBpDuVU4MmIM5LeedzplPz_IIIFRUPV88SH3TEvYKwwLK6t5YyZToA5tj7pKz9FU0U0xIJDBn9E58fDxwSWa2FTdxpbQi8Jl9-K-hbbh"/>
</div>
<div class="flex-grow pr-8">
<p class="font-headline font-extrabold text-on-surface-variant/20 text-3xl italic tracking-tighter">THE FUTURE OF SOIL</p>
</div>
</div>
</div>
</main>
<!-- App Suppression: Navigation shells are hidden for Login journey as per mandate -->
</body></html>
